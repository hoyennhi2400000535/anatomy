 <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Match Game</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        medical: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; overflow-x: hidden; }
        .target-dot {
            transition: all 0.2s ease;
            transform: translate(-50%, -50%);
        }
        .target-dot:hover { transform: translate(-50%, -50%) scale(1.2); }
        .pulsate { animation: pulse-border 1.5s infinite; }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
            100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }
        /* Custom scrollbar for label list */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px;}
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- DỮ LIỆU GIẢI PHẪU (ANATOMY DATA) ---
        const DATABASE = {
            skeletal: {
                name: "Hệ Xương",
                icon: "ph-bone",
                image: "https://placehold.co/400x800/e2e8f0/475569?text=M%C3%B4+h%C3%ACnh+H%E1%BB%87+X%C6%B0%C6%A1ng", // Placeholder for actual human body image
                items: [
                    { id: 'skull', name: 'Xương sọ', x: 50, y: 12, desc: 'Bảo vệ não bộ và tạo hình khuôn mặt.' },
                    { id: 'clavicle', name: 'Xương đòn', x: 35, y: 22, desc: 'Nối xương ức với xương bả vai.' },
                    { id: 'ribs', name: 'Lồng ngực', x: 50, y: 35, desc: 'Bảo vệ tim, phổi và hỗ trợ hô hấp.' },
                    { id: 'spine', name: 'Cột sống', x: 50, y: 48, desc: 'Trục nâng đỡ cơ thể, bảo vệ tủy sống.' },
                    { id: 'pelvis', name: 'Xương chậu', x: 50, y: 58, desc: 'Chuyển trọng lượng từ thân xuống chân.' },
                    { id: 'femur', name: 'Xương đùi', x: 40, y: 72, desc: 'Xương dài và khỏe nhất cơ thể người.' },
                    { id: 'humerus', name: 'Xương cánh tay', x: 25, y: 38, desc: 'Nối bả vai với khuỷu tay.' },
                ]
            },
            digestive: {
                name: "Hệ Tiêu Hóa",
                icon: "ph-stomach",
                image: "https://placehold.co/400x800/fecdd3/881337?text=M%C3%B4+h%C3%ACnh+H%E1%BB%87+Ti%C3%AAu+H%C3%B3a",
                items: [
                    { id: 'esophagus', name: 'Thực quản', x: 50, y: 25, desc: 'Ống dẫn thức ăn từ miệng xuống dạ dày.' },
                    { id: 'liver', name: 'Gan', x: 40, y: 42, desc: 'Lọc máu, tiết mật và chuyển hóa chất.' },
                    { id: 'stomach', name: 'Dạ dày', x: 60, y: 45, desc: 'Nơi chứa và tiêu hóa sơ bộ thức ăn.' },
                    { id: 'pancreas', name: 'Tuyến tụy', x: 55, y: 50, desc: 'Tiết dịch tiêu hóa và hormone insulin.' },
                    { id: 'large_intestine', name: 'Ruột già', x: 50, y: 60, desc: 'Hấp thụ nước và tạo phân.' },
                    { id: 'small_intestine', name: 'Ruột non', x: 50, y: 70, desc: 'Hấp thụ phần lớn chất dinh dưỡng.' },
                ]
            }
        };

        const GAME_MODES = {
            PRACTICE: 'Luyện tập',
            CHALLENGE: 'Thử thách'
        };

        // --- COMPONENTS ---

        const App = () => {
            const [gameState, setGameState] = useState('menu'); // menu, playing, results
            const [selectedSystem, setSelectedSystem] = useState(null);
            const [selectedMode, setSelectedMode] = useState(null);
            
            // Gameplay state
            const [placedItems, setPlacedItems] = useState({}); // { targetId: itemId }
            const [selectedLabelId, setSelectedLabelId] = useState(null);
            const [timeLeft, setTimeLeft] = useState(0);
            const [timerActive, setTimerActive] = useState(false);
            const [scoreData, setScoreData] = useState(null);

            // Timer logic
            useEffect(() => {
                let interval;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                    }, 1000);
                } else if (timerActive && timeLeft === 0) {
                    setTimerActive(false);
                    submitGame(); // Auto submit when time runs out
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const startGame = (systemId, mode) => {
                setSelectedSystem(systemId);
                setSelectedMode(mode);
                setPlacedItems({});
                setSelectedLabelId(null);
                setScoreData(null);
                setGameState('playing');

                if (mode === GAME_MODES.CHALLENGE) {
                    setTimeLeft(DATABASE[systemId].items.length * 10); // 10 seconds per item
                    setTimerActive(true);
                } else {
                    setTimeLeft(0);
                    setTimerActive(false);
                }
            };

            const handleLabelClick = (item) => {
                // If it's already placed, remove it
                const placedTarget = Object.keys(placedItems).find(key => placedItems[key] === item.id);
                if (placedTarget) {
                    const newPlaced = { ...placedItems };
                    delete newPlaced[placedTarget];
                    setPlacedItems(newPlaced);
                    setSelectedLabelId(null);
                    return;
                }

                // Select for placement
                setSelectedLabelId(item.id === selectedLabelId ? null : item.id);
            };

            const handleTargetClick = (targetItem) => {
                if (selectedLabelId) {
                    // Place the selected label here
                    setPlacedItems(prev => {
                        const newPlaced = { ...prev };
                        // Remove if this label is placed elsewhere
                        const existingTarget = Object.keys(newPlaced).find(key => newPlaced[key] === selectedLabelId);
                        if (existingTarget) delete newPlaced[existingTarget];
                        
                        newPlaced[targetItem.id] = selectedLabelId;
                        return newPlaced;
                    });
                    setSelectedLabelId(null); // Deselect after placing
                } else if (placedItems[targetItem.id]) {
                    // Clicked a filled target without a selected label -> remove the label
                    setPlacedItems(prev => {
                        const newPlaced = { ...prev };
                        delete newPlaced[targetItem.id];
                        return newPlaced;
                    });
                }
            };

            const submitGame = () => {
                setTimerActive(false);
                const system = DATABASE[selectedSystem];
                let correctCount = 0;
                const results = system.items.map(item => {
                    const userPlacedId = placedItems[item.id];
                    const isCorrect = userPlacedId === item.id;
                    if (isCorrect) correctCount++;
                    return {
                        ...item,
                        userAnswerId: userPlacedId,
                        isCorrect: isCorrect
                    };
                });

                const total = system.items.length;
                let score100 = Math.round((correctCount / total) * 100);
                
                // Bonus points for challenge mode
                let timeBonus = 0;
                if (selectedMode === GAME_MODES.CHALLENGE && correctCount === total) {
                    timeBonus = timeLeft * 2;
                    score100 += timeBonus;
                }

                setScoreData({
                    correct: correctCount,
                    total: total,
                    score: score100,
                    results: results,
                    timeBonus: timeBonus
                });
                setGameState('results');
            };

            const resetGame = () => {
                setGameState('menu');
            };

            if (gameState === 'menu') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-medical-50 to-slate-100 p-4">
                        <div className="bg-white rounded-2xl shadow-xl max-w-2xl w-full p-8">
                            <div className="text-center mb-10">
                                <i className="ph-fill ph-heartbeat text-5xl text-medical-500 mb-4 inline-block"></i>
                                <h1 className="text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">Anatomy Match</h1>
                                <p className="text-slate-500">Khám phá cơ thể người qua trò chơi ghép nối tương tác</p>
                            </div>

                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                                        <i className="ph ph-books text-xl mr-2 text-medical-500"></i>
                                        1. Chọn hệ cơ quan
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {Object.entries(DATABASE).map(([key, data]) => (
                                            <button 
                                                key={key}
                                                onClick={() => setSelectedSystem(key)}
                                                className={`p-4 rounded-xl border-2 text-left transition-all flex items-center ${selectedSystem === key ? 'border-medical-500 bg-medical-50 text-medical-900 shadow-md' : 'border-slate-200 hover:border-medical-300 hover:bg-slate-50'}`}
                                            >
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center mr-4 ${selectedSystem === key ? 'bg-medical-500 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                                    <i className={`${data.icon} text-2xl`}></i>
                                                </div>
                                                <span className="font-semibold text-lg">{data.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h3 className="text-lg font-semibold text-slate-700 mb-4 flex items-center">
                                        <i className="ph ph-game-controller text-xl mr-2 text-medical-500"></i>
                                        2. Chọn chế độ chơi
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <button 
                                            disabled={!selectedSystem}
                                            onClick={() => startGame(selectedSystem, GAME_MODES.PRACTICE)}
                                            className="p-4 rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-left transition-all disabled:opacity-50 disabled:cursor-not-allowed group"
                                        >
                                            <div className="font-bold text-blue-600 mb-1 flex items-center">
                                                <i className="ph-fill ph-barbell mr-2"></i> Luyện tập
                                            </div>
                                            <p className="text-sm text-slate-500">Không giới hạn thời gian, thoải mái thử sai.</p>
                                        </button>
                                        <button 
                                            disabled={!selectedSystem}
                                            onClick={() => startGame(selectedSystem, GAME_MODES.CHALLENGE)}
                                            className="p-4 rounded-xl border-2 border-slate-200 hover:border-orange-400 hover:bg-orange-50 text-left transition-all disabled:opacity-50 disabled:cursor-not-allowed group"
                                        >
                                            <div className="font-bold text-orange-600 mb-1 flex items-center">
                                                <i className="ph-fill ph-timer mr-2"></i> Thử thách
                                            </div>
                                            <p className="text-sm text-slate-500">Đua với thời gian, nhận điểm thưởng tốc độ.</p>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const systemData = DATABASE[selectedSystem];
            
            // Helper to get name from ID for labels
            const getLabelName = (id) => systemData.items.find(i => i.id === id)?.name || "";

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    {/* Header */}
                    <header className="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 relative">
                        <div className="flex items-center space-x-4">
                            <button onClick={resetGame} className="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">
                                <i className="ph ph-arrow-left text-xl"></i>
                            </button>
                            <div>
                                <h2 className="font-bold text-slate-800 text-lg">{systemData.name}</h2>
                                <span className="text-xs font-medium px-2 py-1 bg-medical-100 text-medical-800 rounded-md">
                                    {selectedMode}
                                </span>
                            </div>
                        </div>
                        
                        {/* Timer / Progress */}
                        {gameState === 'playing' && selectedMode === GAME_MODES.CHALLENGE && (
                            <div className={`flex items-center font-bold text-xl ${timeLeft < 10 ? 'text-red-500 pulsate' : 'text-slate-700'}`}>
                                <i className="ph ph-clock mr-2"></i>
                                {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                            </div>
                        )}
                        {gameState === 'playing' && selectedMode === GAME_MODES.PRACTICE && (
                            <div className="text-slate-500 font-medium">
                                Đã nối: {Object.keys(placedItems).length} / {systemData.items.length}
                            </div>
                        )}
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                        
                        {/* Left: Diagram Area */}
                        <div className="flex-1 bg-slate-200 relative overflow-auto flex items-center justify-center p-4 border-r border-slate-300">
                            <div className="relative w-full max-w-[400px] shadow-2xl rounded-lg overflow-hidden bg-white">
                                <img src={systemData.image} alt={systemData.name} className="w-full h-auto block select-none pointer-events-none opacity-90" />
                                
                                {/* Overlay Target Dots */}
                                {systemData.items.map((item, index) => {
                                    const placedId = placedItems[item.id];
                                    const isSelectedForDrop = selectedLabelId && !placedId;
                                    
                                    // Status colors for Results mode
                                    let dotColor = "bg-white border-slate-400 text-slate-600";
                                    if (gameState === 'results') {
                                        const result = scoreData.results.find(r => r.id === item.id);
                                        if (result.isCorrect) dotColor = "bg-green-500 border-green-600 text-white shadow-[0_0_15px_rgba(34,197,94,0.6)]";
                                        else if (result.userAnswerId) dotColor = "bg-red-500 border-red-600 text-white"; // wrong answer placed
                                        else dotColor = "bg-yellow-400 border-yellow-500 text-white"; // missed
                                    } else if (placedId) {
                                        dotColor = "bg-medical-500 border-medical-600 text-white shadow-md";
                                    } else if (selectedLabelId) {
                                        dotColor = "bg-yellow-200 border-yellow-400 text-yellow-700 pulsate cursor-pointer";
                                    }

                                    return (
                                        <div 
                                            key={`target-${item.id}`}
                                            onClick={() => gameState === 'playing' && handleTargetClick(item)}
                                            className={`absolute target-dot w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold text-sm z-10 transition-colors ${dotColor} ${gameState === 'playing' && !placedId ? 'cursor-pointer hover:bg-slate-100' : ''}`}
                                            style={{ left: `${item.x}%`, top: `${item.y}%` }}
                                            title={item.name}
                                        >
                                            {placedId ? (
                                                <i className="ph-bold ph-check text-xs"></i>
                                            ) : (
                                                <span>{index + 1}</span>
                                            )}
                                            
                                            {/* Show Label if placed */}
                                            {placedId && gameState !== 'results' && (
                                                <div className="absolute top-full mt-1 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs whitespace-nowrap px-2 py-1 rounded pointer-events-none">
                                                    {getLabelName(placedId)}
                                                </div>
                                            )}
                                            {/* Show Correct Label in results */}
                                            {gameState === 'results' && (
                                                 <div className={`absolute top-full mt-1 left-1/2 -translate-x-1/2 text-white text-xs whitespace-nowrap px-2 py-1 rounded font-semibold pointer-events-none ${scoreData.results.find(r=>r.id===item.id).isCorrect ? 'bg-green-600' : 'bg-slate-800'}`}>
                                                    {item.name}
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                        {/* Right: Sidebar Area */}
                        <div className="w-full md:w-[350px] bg-white flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.05)] z-20">
                            
                            {gameState === 'playing' ? (
                                <>
                                    <div className="p-4 bg-slate-50 border-b border-slate-200">
                                        <p className="text-sm text-slate-600 font-medium mb-2">
                                            <i className="ph-fill ph-info mr-1 text-medical-500"></i> 
                                            Hướng dẫn: Chạm vào tên cấu trúc, sau đó chạm vào vị trí số tương ứng trên hình.
                                        </p>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                        {/* Shuffle items array for display so they aren't in order */}
                                        {useMemo(() => [...systemData.items].sort(() => Math.random() - 0.5), [selectedSystem]).map(item => {
                                            const isPlaced = Object.values(placedItems).includes(item.id);
                                            const isSelected = selectedLabelId === item.id;
                                            
                                            return (
                                                <div 
                                                    key={`label-${item.id}`}
                                                    onClick={() => handleLabelClick(item)}
                                                    className={`p-3 rounded-lg border-2 cursor-pointer transition-all flex justify-between items-center
                                                        ${isPlaced ? 'bg-slate-100 border-slate-200 opacity-50' : 
                                                          isSelected ? 'bg-medical-50 border-medical-500 shadow-md ring-2 ring-medical-200 ring-offset-1' : 
                                                          'bg-white border-slate-200 hover:border-medical-300 hover:bg-slate-50'}`}
                                                >
                                                    <span className="font-semibold text-slate-700">{item.name}</span>
                                                    {isPlaced && <i className="ph-fill ph-check-circle text-green-500 text-lg"></i>}
                                                    {isSelected && <span className="text-xs bg-medical-500 text-white px-2 py-0.5 rounded-full">Đang chọn</span>}
                                                </div>
                                            )
                                        })}
                                    </div>
                                    <div className="p-4 border-t border-slate-200 bg-white">
                                        <button 
                                            onClick={submitGame}
                                            className="w-full py-3 bg-medical-600 hover:bg-medical-700 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all flex justify-center items-center"
                                        >
                                            <i className="ph-bold ph-flag-checkered mr-2 text-xl"></i>
                                            Nộp bài
                                        </button>
                                    </div>
                                </>
                            ) : (
                                /* Results Panel */
                                <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
                                    <div className="p-6 text-center bg-white border-b border-slate-200">
                                        <h3 className="text-2xl font-black text-slate-800 mb-1">Kết Quả</h3>
                                        <div className="text-5xl font-black text-medical-500 my-4 flex items-end justify-center">
                                            {scoreData.score} <span className="text-xl text-slate-400 font-medium ml-1">/100</span>
                                        </div>
                                        <div className="flex justify-center space-x-4 text-sm font-medium">
                                            <div className="bg-green-100 text-green-800 px-3 py-1 rounded-full"><i className="ph-fill ph-check-circle mr-1"></i> {scoreData.correct} đúng</div>
                                            <div className="bg-red-100 text-red-800 px-3 py-1 rounded-full"><i className="ph-fill ph-x-circle mr-1"></i> {scoreData.total - scoreData.correct} sai</div>
                                        </div>
                                        {scoreData.timeBonus > 0 && (
                                            <div className="mt-2 text-orange-600 font-bold text-sm bg-orange-50 inline-block px-3 py-1 rounded-full">
                                                <i className="ph-fill ph-lightning"></i> Điểm thưởng tốc độ: +{scoreData.timeBonus}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                        <h4 className="font-bold text-slate-700 flex items-center uppercase text-sm tracking-wider">
                                            <i className="ph-bold ph-list-magnifying-glass mr-2"></i> Chi tiết & Giải thích
                                        </h4>
                                        {scoreData.results.map((result, idx) => (
                                            <div key={`res-${result.id}`} className={`p-4 rounded-xl border ${result.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className={`font-bold text-lg ${result.isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                                        {idx + 1}. {result.name}
                                                    </span>
                                                    {result.isCorrect ? 
                                                        <i className="ph-fill ph-check-circle text-xl text-green-500"></i> : 
                                                        <i className="ph-fill ph-x-circle text-xl text-red-500"></i>
                                                    }
                                                </div>
                                                
                                                {!result.isCorrect && (
                                                    <div className="text-sm text-red-600 mb-2 font-medium bg-white px-2 py-1 rounded border border-red-100 inline-block">
                                                        Của bạn: <span className="line-through opacity-70">{getLabelName(result.userAnswerId) || 'Bỏ trống'}</span>
                                                    </div>
                                                )}
                                                
                                                <div className="text-slate-600 text-sm mt-1 flex items-start">
                                                    <i className="ph-fill ph-lightbulb mt-0.5 mr-1.5 text-yellow-500"></i>
                                                    {result.desc}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="p-4 border-t border-slate-200 bg-white space-y-2">
                                        <button 
                                            onClick={() => startGame(selectedSystem, selectedMode)}
                                            className="w-full py-3 bg-medical-100 hover:bg-medical-200 text-medical-800 rounded-xl font-bold transition-all"
                                        >
                                            <i className="ph-bold ph-arrows-counter-clockwise mr-2"></i> Làm lại
                                        </button>
                                        <button 
                                            onClick={resetGame}
                                            className="w-full py-3 bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-700 rounded-xl font-bold transition-all"
                                        >
                                            Về Menu chính
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
