    <style>

            color: #f1f5f9;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const playSound = (type) => {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                const ctx = new AudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(); osc.stop(ctx.currentTime + 0.45);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'select') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'victory') {
                    const notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
                    notes.forEach((freq, idx) => {
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.08);
                        g.gain.setValueAtTime(0.15, ctx.currentTime + idx * 0.08);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + idx * 0.08 + 0.2);
                        o.start(ctx.currentTime + idx * 0.08); o.stop(ctx.currentTime + idx * 0.08 + 0.25);
                    });
                }
            } catch (e) { console.log("Audio block:", e); }
        };

        // Dữ liệu y khoa học thuật không thay đổi, dùng cho text-matching
        const DATABASE = {
            skeletal: {
                name: "Hệ Xương (Skeletal System)", icon: "ph-bone",
                desc: "Hệ thống khung nâng đỡ cơ thể, bảo vệ các nội quan và làm điểm tựa chịu lực cho cơ bắp di động.",
                items: [
                    { id: 'skull', name: 'Xương sọ (Cranium)', desc: 'Cấu trúc xương vòm bảo vệ đại não và cấu tạo khung xương mặt diện.' },
                    { id: 'mandible', name: 'Xương hàm dưới (Mandible)', desc: 'Khung xương di động duy nhất ở sọ giúp nhai và phát âm.' },

                    { id: 'clavicle', name: 'Xương đòn (Clavicle)', desc: 'Xương hình chữ S nối chi trên với xương ức ngực, dễ gãy khi ngã chống tay.' },
                    { id: 'scapula', name: 'Xương bả vai (Scapula)', desc: 'Tấm xương dẹt hình tam giác phía sau vai, hỗ trợ linh hoạt khớp vai.' },
                    { id: 'sternum', name: 'Xương ức (Sternum)', desc: 'Trục xương dẹt dọc trước ngực làm điểm nối các sụn sườn.' },

                    { id: 'spine', name: 'Cột sống ngực (Thoracic)', desc: 'Trục đỡ trung tâm thân trên, bảo vệ dây tủy sống chạy bên trong.' },
                    { id: 'lumbar_vertebrae', name: 'Cột sống thắt lưng', desc: '5 đốt to dày chịu lực nén lớn nhất của trọng lượng nửa trên thân thể.' },
                    { id: 'sacrum', name: 'Xương cùng (Sacrum)', desc: 'Khối xương hợp nhất hình chêm gắn chặt vào xương chậu tạo bệ đỡ.' },
                    { id: 'pelvis', name: 'Xương chậu (Pelvis)', desc: 'Cấu trúc vòng xương vững chắc kết nối thân trên với chi dưới.' },
                    { id: 'humerus', name: 'Xương cánh tay (Humerus)', desc: 'Xương dài chi trên nối từ ổ chảo bả vai tới khớp khuỷu tay.' },

                    { id: 'ulna', name: 'Xương trụ (Ulna)', desc: 'Xương cẳng tay phía ngón út, đầu trên tạo thành mỏm khuỷu bản lề.' },
                    { id: 'carpals', name: 'Xương cổ tay (Carpals)', desc: 'Nhóm 8 xương khối nhỏ xếp 2 hàng tạo sự linh hoạt đa chiều ở cổ tay.' },
                    { id: 'femur', name: 'Xương đùi (Femur)', desc: 'Xương dài, nặng và chịu lực bền bỉ khỏe nhất trong cơ thể người.' },
                    { id: 'patella', name: 'Xương bánh chè (Patella)', desc: 'Xương vừng lớn nhất nằm trong gân cơ tứ đầu bảo vệ mặt trước khớp gối.' },

                    { id: 'fibula', name: 'Xương mác (Fibula)', desc: 'Xương thanh mảnh bên cạnh xương chày làm nơi bám của các cơ cẳng chân.' },

            },
            cardiovascular: {

                    { id: 'aorta', name: 'Động mạch chủ (Aorta)', desc: 'Động mạch lớn nhất xuất phát từ thất trái dẫn máu áp lực cao đi nuôi cơ thể.' },
                    { id: 'superior_vc', name: 'Tĩnh mạch chủ trên', desc: 'Thu hồi máu đã trao đổi chất từ vùng đầu, cổ, chi trên về nhĩ phải.' },

                    { id: 'pulmonary_veins', name: 'Tĩnh mạch phổi', desc: 'Hệ thống tĩnh mạch duy nhất mang máu đỏ tươi giàu oxy về tim.' },

                    { id: 'pleura', name: 'Màng phổi', desc: 'Lớp màng kép trơn trượt chứa dịch mỏng giúp phổi co giãn êm ái lồng ngực khi hít thở.' },
                    { id: 'diaphragm', name: 'Cơ hoành', desc: 'Cơ vân phẳng ngăn ngực với ổ bụng, là cơ hô hấp chính tạo ra nhịp hít thở bình thường.' },
                    { id: 'vocal_cords', name: 'Dây thanh âm', desc: 'Hai dải màng cơ rung động phát ra âm thanh khi dòng khí thở ra đi qua chúng.' },
                    { id: 'bronchioles', name: 'Tiểu phế quản', desc: 'Nhánh phế quản nhỏ nhất không có sụn, có cơ trơn dễ co thắt mạnh khi lên cơn hen suyễn.' },
                    { id: 'conchae', name: 'Xoăn mũi', desc: 'Các cấu trúc xương xoăn giúp tăng tối đa bề mặt tiếp xúc của không khí bên trong mũi.' },
                    { id: 'sinuses', name: 'Các xoang mặt', desc: 'Các hốc xương rỗng vùng sọ mặt giúp cộng hưởng âm thanh và giảm nhẹ trọng lượng sọ.' },
                    { id: 'intercostals', name: 'Cơ liên sườn', desc: 'Nhóm cơ nằm xen giữa các xương sườn, co rút làm nâng giãn lồng ngực khi hít sâu.' },
                    { id: 'thyroid_cartilage', name: 'Sụn giáp', desc: 'Miếng sụn lớn bảo vệ mặt trước thanh quản, nhô ra tạo thành "quả táo Adam" ở nam giới.' },
                    { id: 'accessory_muscles', name: 'Cơ hô hấp phụ', desc: 'Các cơ cổ và ngực chỉ tham gia hỗ trợ nâng lồng ngực khi người bệnh gắng sức thở mệt.' },
                    { id: 'cardiac_notch', name: 'Khuyết tim', desc: 'Độ lõm trên bờ trước thùy phổi trái để nhường không gian chứa mỏm tim.' }
                ]
            },
            digestive: {
                name: "Hệ Tiêu Hóa (Digestive)", icon: "ph-egg",
                desc: "Thực hiện bẻ gãy cấu trúc thức ăn thô thành các dưỡng chất siêu vi cơ thể hấp thụ được qua ruột.",
                items: [
                    { id: 'mouth', name: 'Khoang miệng', desc: 'Điểm khởi đầu ống tiêu hóa, nơi diễn ra tiêu hóa cơ học (nhai) và hóa học sơ khởi.' },
                    { id: 'tongue', name: 'Lưỡi', desc: 'Cơ vân linh hoạt nhào trộn thức ăn, tạo viên nuốt và chứa gai cảm nhận vị giác.' },
                    { id: 'salivary_glands', name: 'Tuyến nước bọt', desc: 'Tiết enzyme Amylase phân giải tinh bột chín thành đường đôi ngay từ miệng.' },
                    { id: 'pharynx', name: 'Họng (Pharynx)', desc: 'Đoạn ống cơ đẩy viên thức ăn đã nhai xuống thực quản qua phản xạ nuốt tự động.' },
                    { id: 'esophagus', name: 'Thực quản', desc: 'Ống cơ dài ~25cm chuyển thức ăn từ họng xuống dạ dày bằng các làn sóng nhu động.' },
                    { id: 'stomach', name: 'Dạ dày', desc: 'Túi cơ hình chữ J co bóp mạnh, tiết acid HCl và enzyme Pepsin để cắt đứt protein.' },
                    { id: 'duodenum', name: 'Tá tràng', desc: 'Đoạn đầu hình chữ C của ruột non, nơi dịch mật và dịch tụy đổ vào để tiêu hóa chính.' },
                    { id: 'jejunum', name: 'Hỗng tràng', desc: 'Phần giữa ruột non dài và cuộn khúc, thực hiện hấp thu phần lớn chất dinh dưỡng vào máu.' },
                    { id: 'ileum', name: 'Hồi tràng', desc: 'Đoạn cuối ruột non chuyên biệt cho việc hấp thu vitamin B12 và tái hấp thu muối mật.' },
                    { id: 'cecum', name: 'Manh tràng', desc: 'Túi cùng khởi đầu của đại tràng kết nối ruột non, chứa van hồi-manh tràng ngăn trào ngược.' },
                    { id: 'appendix', name: 'Ruột thừa', desc: 'Mô lympho hình giun đính ở manh tràng, đóng vai trò như kho lưu trú của vi khuẩn đường ruột có lợi.' },
                    { id: 'ascending_colon', name: 'Đại tràng lên', desc: 'Đoạn ruột già chạy dọc mạn sườn phải, bắt đầu quá trình hút lại nước từ bã thức ăn.' },
                    { id: 'transverse_colon', name: 'Đại tràng ngang', desc: 'Đoạn vắt ngang qua ổ bụng từ phải sang trái dưới dạ dày.' },
                    { id: 'descending_colon', name: 'Đại tràng xuống', desc: 'Đoạn ruột già chạy dọc mạn sườn trái lưu trữ chất bã ngày càng đặc dần.' },
                    { id: 'sigmoid_colon', name: 'Đại tràng xích-ma', desc: 'Đoạn uốn cong hình chữ S dẫn xuống trực tràng chứa và định hình phân.' },
                    { id: 'rectum', name: 'Trực tràng', desc: 'Đoạn ống thẳng cuối cùng lưu trữ tạm thời khối phân và kích hoạt phản xạ mót rặn.' },
                    { id: 'anus', name: 'Hậu môn', desc: 'Khe hở cuối có cơ thắt tự chủ điều khiển quá trình phóng thích phân ra môi trường.' },
                    { id: 'liver', name: 'Gan', desc: 'Tuyến tiêu hóa lớn nhất thực hiện khử độc máu và sản xuất dịch mật phân giải mỡ.' },
                    { id: 'gallbladder', name: 'Túi mật', desc: 'Túi nhỏ dưới gan nhận, lưu trữ và cô đặc dịch mật, sẽ bơm vào ruột khi ăn đồ béo.' },
                    { id: 'pancreas', name: 'Tuyến tụy', desc: 'Tiết dịch tụy chứa dồi dào enzyme tiêu hóa thức ăn và tiết hormone Insulin cân bằng đường huyết.' }
                ]
            }
        };

        const GAME_MODES = {
            STUDY: 'Học thuyết flashcard',
            PRACTICE: 'Luyện tập khớp chữ',
            CHALLENGE: 'Thử thách tốc độ'
        };

        const App = () => {
            const [gameState, setGameState] = useState('menu'); // menu, playing, results, study
            const [selectedSystem, setSelectedSystem] = useState('skeletal');
            const [selectedMode, setSelectedMode] = useState(GAME_MODES.PRACTICE);
            
            // Gamification state
            const [xp, setXp] = useState(() => Number(localStorage.getItem('text_anatomy_xp') || 0));
            const [level, setLevel] = useState(() => Math.floor(xp / 100) + 1);
            const [highScores, setHighScores] = useState(() => JSON.parse(localStorage.getItem('text_anatomy_highscores') || '{}'));
            
            // Playing state
            const [shuffledDescs, setShuffledDescs] = useState([]);
            const [shuffledTerms, setShuffledTerms] = useState([]);
            const [matchedIds, setMatchedIds] = useState([]);
            const [selection, setSelection] = useState(null); // { type: 'term'|'desc', id: string }
            const [wrongPair, setWrongPair] = useState(null); // { term: id, desc: id }
            
            const [timeLeft, setTimeLeft] = useState(120);
            const [timerActive, setTimerActive] = useState(false);
            const [lives, setLives] = useState(3);
            const [streak, setStreak] = useState(0);
            const [scoreData, setScoreData] = useState(null);

            // Ref cho âm thanh và scroll
            const playingAreaRef = useRef(null);

            const gainXP = (amount) => {
                setXp(prev => {
                    const newXp = prev + amount;
                    localStorage.setItem('text_anatomy_xp', newXp);
                    setLevel(Math.floor(newXp / 100) + 1);
                    return newXp;
                });
            };

            // Setup trò chơi
            const startPlaying = (systemId, mode) => {
                playSound('select');
                setSelectedSystem(systemId);
                setSelectedMode(mode);
                setMatchedIds([]);
                setSelection(null);
                setWrongPair(null);
                setStreak(0);
                
                const sysItems = DATABASE[systemId].items;

                if (mode !== GAME_MODES.STUDY) {
                    // Xáo trộn 2 cột độc lập
                    setShuffledTerms([...sysItems].sort(() => Math.random() - 0.5));
                    setShuffledDescs([...sysItems].sort(() => Math.random() - 0.5));
                }

                if (mode === GAME_MODES.CHALLENGE) {
                    setLives(3);
                    setTimeLeft(90);
                    setTimerActive(true);
                    setGameState('playing');
                } else if (mode === GAME_MODES.STUDY) {
                    setTimerActive(false);
                    setGameState('study');
                } else {
                    setTimerActive(false);
                    setGameState('playing');
                }
            };

            // Timer cho chế độ Challenge
            useEffect(() => {
                let interval;
                if (timerActive && timeLeft > 0 && gameState === 'playing') {
                    interval = setInterval(() => setTimeLeft(p => p - 1), 1000);
                } else if (timerActive && timeLeft <= 0 && gameState === 'playing') {
                    setTimerActive(false);
                    finishGame(false, false);
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft, gameState]);

            // Kiểm tra điều kiện Thắng/Thua
            useEffect(() => {
                if (gameState !== 'playing') return;
                const sysItems = DATABASE[selectedSystem]?.items;
                if (!sysItems) return;

                if (matchedIds.length === sysItems.length) {
                    // Win
                    setTimeout(() => finishGame(true, true), 600);
                } else if (selectedMode === GAME_MODES.CHALLENGE && lives <= 0) {
                    // Lose
                    setTimeout(() => finishGame(false, false), 600);
                }
            }, [matchedIds.length, lives, gameState, selectedSystem, selectedMode]);

            const handleItemClick = useCallback((type, id) => {
                if (matchedIds.includes(id) || wrongPair) return;

                if (!selection) {
                    playSound('select');
                    setSelection({ type, id });
                    return;
                }

                if (selection.type === type) {
                    // Chọn lại cùng một cột -> Đổi lựa chọn
                    playSound('select');
                    setSelection(selection.id === id ? null : { type, id });
                } else {
                    // Chọn chéo cột -> Đánh giá kết quả lập tức
                    if (selection.id === id) {
                        // Đúng
                        playSound('correct');
                        setMatchedIds(prev => [...prev, id]);
                        setSelection(null);
                        setStreak(p => p + 1);
                        if (selectedMode === GAME_MODES.PRACTICE) gainXP(5);
                    } else {
                        // Sai
                        playSound('wrong');
                        setStreak(0);
                        const termId = type === 'term' ? id : selection.id;
                        const descId = type === 'desc' ? id : selection.id;
                        
                        setWrongPair({ term: termId, desc: descId });
                        setTimeout(() => setWrongPair(null), 800); // Reset visual error sau 0.8s
                        
                        if (selectedMode === GAME_MODES.CHALLENGE) {
                            setLives(l => l - 1);
                        }
                        setSelection(null);
                    }
                }
            }, [selection, matchedIds, wrongPair, selectedMode]);


            const finishGame = (isWin, isCompleted) => {
                setTimerActive(false);
                const sysItems = DATABASE[selectedSystem].items;
                const total = sysItems.length;
                const correct = matchedIds.length;
                
                let score = Math.round((correct / total) * 100);
                let bonus = 0;

                if (isCompleted && selectedMode === GAME_MODES.CHALLENGE) {
                    bonus = timeLeft * 4; // Thưởng thời gian
                    score += bonus;
                    if (score >= 100) playSound('victory');
                } else {
                    playSound('select');
                }

                if (selectedMode === GAME_MODES.CHALLENGE) {
                    const currentHigh = highScores[selectedSystem] || 0;
                    if (score > currentHigh) {
                        const newHigh = { ...highScores, [selectedSystem]: score };
                        setHighScores(newHigh);
                        localStorage.setItem('text_anatomy_highscores', JSON.stringify(newHigh));
                    }
                }

                const xpGained = (correct * 5) + (bonus > 0 ? 50 : 0);
                if (selectedMode === GAME_MODES.CHALLENGE) gainXP(xpGained);

                setScoreData({
                    total, correct, score, bonus, xpGained, isCompleted
                });
                setGameState('results');
            };

            if (gameState === 'menu') {
                return (
                    <div className="min-h-screen bg-cyber-bg flex flex-col p-6 items-center justify-center relative medical-grid">
                        <div className="max-w-5xl w-full z-10">
                            <div className="text-center mb-12">
                                <div className="inline-flex items-center space-x-2 bg-cyan-950/40 border border-cyan-500/30 px-4 py-2 rounded-full text-cyan-400 mb-4 font-mono text-xs glow-teal">
                                    <i className="ph-fill ph-terminal-window"></i>
                                    <span>TEXT-BASED MEDICAL TERMINAL V3.0</span>
                                </div>
                                <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight font-mono mb-3 text-slate-100">
                                    ANATOMY <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-teal-400">THEORY MATCH</span>
                                </h1>
                                <p className="text-slate-400 max-w-lg mx-auto text-sm">
                                    Không hình ảnh. Không phân tâm. Chỉ có bạn và khối kiến thức lý thuyết giải phẫu học thuật khổng lồ.
                                </p>
                            </div>

                            {/* User Profile */}
                            <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-4 mb-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 rounded-xl bg-cyan-950 border border-cyan-500 flex items-center justify-center text-cyan-400 glow-teal font-mono font-bold text-lg">
                                        L.{level}
                                    </div>
                                    <div>
                                        <div className="text-sm font-bold text-slate-200 font-mono">Bác Sĩ Thực Tập</div>
                                        <div className="text-xs text-slate-500 mt-1 font-mono">XP: {xp} / {level * 100}</div>
                                        <div className="w-48 bg-slate-800 h-1.5 rounded-full mt-1.5 overflow-hidden">
                                            <div className="bg-cyan-500 h-full transition-all" style={{ width: `${(xp % 100)}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Systems List */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {Object.entries(DATABASE).map(([key, data]) => (
                                    <div key={key} className="bg-slate-900/30 border border-slate-800 rounded-2xl p-5 hover:bg-slate-900/80 hover:border-cyan-500/40 transition-all flex flex-col">
                                        <div className="flex items-start space-x-4 mb-4">
                                            <div className="w-12 h-12 shrink-0 rounded-xl bg-cyan-950/40 border border-cyan-800 flex items-center justify-center text-cyan-400 text-2xl">
                                                <i className={data.icon}></i>
                                            </div>
                                            <div>
                                                <h3 className="font-mono font-bold text-lg text-slate-200">{data.name}</h3>
                                                <div className="text-xs text-cyan-500 font-mono mt-0.5">{data.items.length} Khái niệm</div>
                                                <p className="text-xs text-slate-400 mt-2 line-clamp-2">{data.desc}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-auto grid grid-cols-3 gap-2 border-t border-slate-800 pt-4">
                                            <button onClick={() => startPlaying(key, GAME_MODES.STUDY)} className="py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-mono font-semibold transition">
                                                Học liệu
                                            </button>
                                            <button onClick={() => startPlaying(key, GAME_MODES.PRACTICE)} className="py-2 bg-cyan-950 hover:bg-cyan-900 text-cyan-300 rounded-lg text-xs font-mono font-bold transition">
                                                Khớp nối
                                            </button>
                                            <button onClick={() => startPlaying(key, GAME_MODES.CHALLENGE)} className="py-2 bg-amber-600/20 hover:bg-amber-600/40 border border-amber-600/30 text-amber-400 rounded-lg text-xs font-mono font-bold transition flex items-center justify-center space-x-1">
                                                <i className="ph-fill ph-timer text-sm"></i> <span>Tính giờ</span>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            const currentSystem = DATABASE[selectedSystem];

            return (
                <div className="min-h-screen h-screen bg-cyber-bg flex flex-col overflow-hidden">
                    {/* Header Top Bar */}
                    <header className="border-b border-slate-800 bg-slate-950 px-4 py-3 shrink-0 flex items-center justify-between z-20">
                        <div className="flex items-center space-x-3">
                            <button onClick={() => { playSound('select'); setGameState('menu'); }} className="w-9 h-9 border border-slate-800 rounded-lg hover:bg-slate-800 flex items-center justify-center text-slate-400 transition">
                                <i className="ph ph-arrow-left"></i>
                            </button>
                            <div className="hidden sm:block">
                                <div className="font-mono font-bold text-slate-200 text-sm flex items-center space-x-2">
                                    <i className={`${currentSystem.icon} text-cyan-400`}></i>
                                    <span>{currentSystem.name}</span>
                                </div>
                                <div className="text-[10px] text-slate-500 font-mono mt-0.5">Chế độ: {selectedMode}</div>
                            </div>
                        </div>

                        {gameState === 'playing' && (
                            <div className="flex items-center space-x-4">
                                {streak > 1 && (
                                    <div className="hidden sm:flex text-[10px] font-mono font-bold text-amber-400 bg-amber-950/40 px-2 py-1 rounded border border-amber-900 animate-pulse">
                                        Combo x{streak}
                                    </div>
                                )}
                                
                                <div className="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-lg text-xs font-mono font-medium flex items-center">
                                    <span className="text-slate-400 mr-2">Tiến độ:</span>
                                    <span className="text-cyan-400 font-bold">{matchedIds.length}</span>
                                    <span className="text-slate-600 mx-1">/</span>
                                    <span className="text-slate-400">{currentSystem.items.length}</span>
                                </div>

                                {selectedMode === GAME_MODES.CHALLENGE && (
                                    <>
                                        <div className={`font-mono font-bold text-sm px-3 py-1.5 rounded-lg border flex items-center ${timeLeft < 15 ? 'text-rose-400 border-rose-500 bg-rose-950/30 animate-pulse' : 'text-slate-300 border-slate-800 bg-slate-900'}`}>
                                            <i className="ph-fill ph-timer mr-1.5"></i>
                                            {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                        </div>
                                        <div className="flex space-x-1">
                                            {[...Array(3)].map((_, i) => (
                                                <i key={i} className={`ph-fill ph-heart text-sm ${i < lives ? 'text-rose-500 drop-shadow-[0_0_5px_rgba(244,63,94,0.5)]' : 'text-slate-800'}`}></i>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 relative flex flex-col min-h-0">
                        {/* 1. STUDY MODE: Flashcard List */}
                        {gameState === 'study' && (
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 max-w-4xl mx-auto w-full space-y-4">
                                <div className="bg-cyan-950/20 border border-cyan-900/50 rounded-xl p-4 mb-6">
                                    <h2 className="text-cyan-400 font-mono font-bold text-lg flex items-center"><i className="ph ph-book-open mr-2"></i>Tài liệu học thuyết</h2>
                                    <p className="text-xs text-slate-400 mt-1">Đọc kỹ các định nghĩa dưới đây trước khi tham gia chế độ luyện tập. Trò chơi yêu cầu bạn phải ghép chính xác thuật ngữ với định nghĩa của nó.</p>
                                </div>
                                {currentSystem.items.map((item, idx) => (
                                    <div key={item.id} className="bg-slate-900/40 border border-slate-800 rounded-xl p-5 hover:border-slate-700 transition flex flex-col md:flex-row md:items-start gap-3">
                                        <div className="md:w-1/3 shrink-0">
                                            <div className="text-[10px] font-mono text-slate-500 mb-1">Mã tham chiếu: #{String(idx+1).padStart(2,'0')}</div>
                                            <div className="font-mono font-bold text-cyan-300 text-base">{item.name}</div>
                                        </div>
                                        <div className="md:w-2/3 bg-slate-950/50 p-3 rounded-lg border border-slate-800/50">
                                            <p className="text-sm text-slate-300 leading-relaxed">{item.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {gameState === 'playing' && (
                            <div className="flex-1 flex flex-col min-h-0 bg-slate-950">
                                {/* Mobile Floating Selection Status */}
                                <div className="md:hidden shrink-0 bg-slate-900 border-b border-slate-800 p-3 shadow-md z-10 sticky top-0">
                                    <div className="text-[10px] text-slate-400 font-mono mb-1 uppercase tracking-wider">Mục đang chọn:</div>
                                    {selection ? (
                                        <div className="font-mono text-xs font-bold text-cyan-300 bg-cyan-950/40 border border-cyan-800 p-2 rounded flex justify-between items-center">
                                            <span className="line-clamp-1 truncate">
                                                {selection.type === 'term' ? currentSystem.items.find(i=>i.id===selection.id).name : currentSystem.items.find(i=>i.id===selection.id).desc}
                                            </span>
                                            <button onClick={() => setSelection(null)} className="ml-2 text-slate-400 p-1"><i className="ph ph-x"></i></button>
                                        </div>
                                    ) : (
                                        <div className="font-mono text-xs text-slate-600 italic p-2 border border-dashed border-slate-800 rounded">
                                            Chưa chọn mục nào...
                                        </div>
                                    )}
                                </div>

                                {/* Desktop Floating Guide */}
                                <div className="hidden md:flex shrink-0 bg-slate-900/80 border-b border-slate-800 p-2 justify-center items-center text-xs font-mono text-slate-400 space-x-6 z-10">
                                    <div className="flex items-center"><i className="ph-fill ph-cursor-click text-cyan-500 mr-2"></i> 1. Chọn Thuật ngữ bên trái</div>
                                    <i className="ph ph-arrow-right text-slate-600"></i>
                                    <div className="flex items-center"><i className="ph-fill ph-book-open text-teal-500 mr-2"></i> 2. Chọn Định nghĩa tương ứng bên phải</div>
                                </div>

                                {/* Two Columns Board */}
                                <div className="flex-1 overflow-y-auto p-4 md:p-6 pb-20 md:pb-6 no-scrollbar">
                                    <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8 h-full">
                                        
                                        {/* Column 1: Terms */}
                                        <div className="flex flex-col space-y-3">
                                            <h3 className="sticky top-0 bg-slate-950 py-2 font-mono font-bold text-slate-400 text-sm border-b border-slate-800 z-10">THUẬT NGỮ CƠ QUAN</h3>
                                            {shuffledTerms.map(term => {
                                                const isMatched = matchedIds.includes(term.id);
                                                const isSelected = selection?.type === 'term' && selection?.id === term.id;
                                                const isWrong = wrongPair?.term === term.id;

                                                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 font-mono font-bold text-sm relative overflow-hidden ";
                                                
                                                if (isMatched) {
                                                    btnClass += "bg-emerald-950/20 border-emerald-900/50 text-emerald-700 opacity-40 cursor-not-allowed";
                                                } else if (isWrong) {
                                                    btnClass += "bg-rose-950/40 border-rose-500 text-rose-300 animate-shake glow-red";
                                                } else if (isSelected) {
                                                    btnClass += "bg-cyan-950/60 border-cyan-400 text-cyan-200 scale-[1.02] glow-teal z-10";
                                                } else {
                                                    btnClass += "bg-slate-900/60 border-slate-800 text-slate-300 hover:border-slate-600 hover:bg-slate-800 cursor-pointer shadow-sm";
                                                }

                                                return (
                                                    <button key={`term-${term.id}`} disabled={isMatched} onClick={() => handleItemClick('term', term.id)} className={btnClass}>
                                                        <span className="relative z-10">{term.name}</span>
                                                        {isMatched && <i className="ph-fill ph-check-circle absolute right-4 top-1/2 -translate-y-1/2 text-xl text-emerald-600"></i>}
                                                    </button>
                                                );
                                            })}
                                        </div>

                                        {/* Column 2: Definitions */}
                                        <div className="flex flex-col space-y-3 mt-8 md:mt-0">
                                            <h3 className="sticky top-0 bg-slate-950 py-2 font-mono font-bold text-slate-400 text-sm border-b border-slate-800 z-10">ĐỊNH NGHĨA CHỨC NĂNG LÝ THUYẾT</h3>
                                            {shuffledDescs.map(desc => {
                                                const isMatched = matchedIds.includes(desc.id);
                                                const isSelected = selection?.type === 'desc' && selection?.id === desc.id;
                                                const isWrong = wrongPair?.desc === desc.id;

                                                let cardClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 relative overflow-hidden ";
                                                
                                                if (isMatched) {
                                                    cardClass += "bg-emerald-950/10 border-emerald-900/30 text-emerald-800 opacity-40 cursor-not-allowed";
                                                } else if (isWrong) {
                                                    cardClass += "bg-rose-950/30 border-rose-500 text-rose-200 animate-shake glow-red";
                                                } else if (isSelected) {
                                                    cardClass += "bg-teal-950/60 border-teal-400 text-teal-100 scale-[1.02] shadow-[0_0_15px_rgba(45,212,191,0.3)] z-10";
                                                } else {
                                                    cardClass += "bg-slate-900/40 border-slate-800 text-slate-300 hover:border-slate-700 hover:bg-slate-800/80 cursor-pointer shadow-sm";
                                                }

                                                return (
                                                    <button key={`desc-${desc.id}`} disabled={isMatched} onClick={() => handleItemClick('desc', desc.id)} className={cardClass}>
                                                        <p className="relative z-10 text-[13px] md:text-sm leading-relaxed pr-6">{desc.desc}</p>
                                                        {isMatched && <i className="ph-bold ph-check absolute right-4 top-1/2 -translate-y-1/2 text-emerald-700 text-lg"></i>}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {gameState === 'results' && scoreData && (
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 flex items-center justify-center bg-slate-950">
                                <div className="max-w-xl w-full bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-10 text-center shadow-2xl relative overflow-hidden">
                                    {/* Decor */}
                                    <div className={`absolute -top-20 -right-20 w-40 h-40 rounded-full blur-3xl opacity-20 ${scoreData.isCompleted ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>

                                    <div className="mb-6">
                                        {scoreData.isCompleted ? (
                                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-950 border-2 border-emerald-500 text-emerald-400 mb-4 shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                                                <i className="ph-fill ph-check-circle text-3xl"></i>
                                            </div>
                                        ) : (
                                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-rose-950 border-2 border-rose-500 text-rose-400 mb-4">
                                                <i className="ph-fill ph-x-circle text-3xl"></i>
                                            </div>
                                        )}
                                        <h2 className="text-2xl font-mono font-black text-slate-100">
                                            {scoreData.isCompleted ? 'HOÀN THÀNH BÀI KIỂM TRA' : 'THẤT BẠI NHIỆM VỤ'}
                                        </h2>
                                        <p className="text-slate-400 text-sm mt-2 font-mono">
                                            Hệ thống: {currentSystem.name}
                                        </p>
                                    </div>

                                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-6 mb-8 flex flex-col items-center">
                                        <div className="text-[10px] text-slate-500 font-mono uppercase tracking-widest mb-2">ĐIỂM ĐÁNH GIÁ NĂNG LỰC</div>
                                        <div className="text-5xl font-mono font-black text-cyan-400 flex items-baseline">
                                            {scoreData.score}
                                            <span className="text-lg font-normal text-slate-600 ml-1">/100</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4 w-full mt-6 text-sm font-mono">
                                            <div className="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-col">
                                                <span className="text-slate-500 text-xs mb-1">Khớp đúng</span>
                                                <span className="font-bold text-emerald-400 text-lg">{scoreData.correct} / {scoreData.total}</span>
                                            </div>
                                            <div className="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-col">
                                                <span className="text-slate-500 text-xs mb-1">XP Thu được</span>
                                                <span className="font-bold text-amber-400 text-lg">+{scoreData.xpGained}</span>
                                            </div>
                                        </div>

                                        {scoreData.bonus > 0 && (
                                            <div className="w-full mt-4 bg-teal-950/30 border border-teal-900/50 p-2 rounded-lg text-teal-400 text-xs flex justify-center items-center font-mono">
                                                <i className="ph-fill ph-lightning mr-2"></i> Thưởng tốc độ hoàn thành: +{scoreData.bonus} điểm
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <button onClick={() => startPlaying(selectedSystem, selectedMode)} className="flex-1 py-3 px-4 bg-cyan-950 hover:bg-cyan-900 border border-cyan-500 text-cyan-300 rounded-xl font-mono font-bold transition">
                                            Luyện lại màn này
                                        </button>
                                        <button onClick={() => setGameState('menu')} className="flex-1 py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 rounded-xl font-mono font-bold transition">
                                            Về Menu chính
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
